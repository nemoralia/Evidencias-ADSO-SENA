<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NEMORALIA</title>
        <!-- Bootstrap CSS -->
        <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
        <!-- Material Icons -->
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <style>
        .text-white {
            color: white;
        }
        .nav-icons .nav-link {
            display: flex;
            align-items: center;
            padding: 0.5rem;
        }
        .nav-icons .material-icons {
            font-size: 24px;
            margin-right: 0.5rem;
        }
        .navbar-brand {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .navbar-brand img {
            max-height: 40px;
        }
        </style>
    </head>
<body>

    <!-- BARRA NAVEGACION -->
     
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="imagenes/letra logo.png" alt="NEMORALIA" class="img-fluid">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav nav-icons">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">
                            <span class="material-icons">facebook</span> Facebook
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">
                            <span class="material-icons">shopping_cart</span> Carrito
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">
                            <span class="material-icons">person</span> Usuario
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    

    <!-- FORMULARIO DE REGISTRO -->
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="w-50">
            <!-- CUADRO ROJO -->
            <div class="border p-3" style="background-color: red;">
                <h2 class="text-center" style="color:white;font-weight: bold;">¡Hola de nuevo!</h2>
                <h3 class="text-center" style="color:white;font-weight: bold;">Inicia sesión para continuar.</h3>
            </div>
            <!-- CUADRO NEGRO -->
            <div class="border p-4 shadow" style="background-color: black; margin-top: -1px;">
                <form>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label text-white">Usuario</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                    </div>

                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label text-white">Contraseña</label>
                        <input type="password" class="form-control" id="exampleInputPassword1">
                    </div>
                    <div class="text-center">
                    <button type="button" class="btn btn-dark">Ingresar</button>
                    </div>

                    <!-- Enlaces de "¿Olvidaste tu contraseña?" -->
                    <div class="mt-3 text-center">
                        <a href="#" class="d-block">¿Olvidaste tu contraseña?</a>
                        <a href="#" class="d-block">¿No tienes cuenta? Regístrate aquí</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
