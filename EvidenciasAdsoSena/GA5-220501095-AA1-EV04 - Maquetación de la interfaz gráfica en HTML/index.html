<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barra de Navegación</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar {
            background-color: white;
        }
        .navbar-brand {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .navbar-brand img {
            height: 60px; /* Aumenta el tamaño de la imagen */
            width: auto; /* Mantiene la proporción de la imagen */
        }
        .nav-icons .material-icons {
            font-size: 24px;
            margin-right: 0.5rem;
        }
        .banner-container {
            height: 250px; /* Ajusta la altura del banner según sea necesario */
            overflow: hidden; /* Oculta el desbordamiento */
        }
        .banner-container img {
            width: 100%;
            height: auto;
        }
        body {
            position: relative;
            z-index: 1;
        }
        .watermark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("imagenes/logo completo.png") no-repeat center center;
            background-size: cover;
            opacity: 0.1; /* Ajusta la opacidad para el efecto de marca de agua */
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="watermark"></div>

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand mx-auto" href="#">
                <img src="imagenes/letra logo.png" alt="NEMORALIA">
            </a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav nav-icons">
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <span class="material-icons">facebook</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <span class="material-icons">shopping_cart</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <span class="material-icons">person</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- BANNER -->
    <div class="banner-container">
        <img src="imagenes/camiseta negra.jpg" alt="Banner" class="img-fluid">
    </div>

    <!-- FORMULARIO DE REGISTRO -->
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; margin-top: 0;">
        <div class="w-50">
            <!-- CUADRO ROJO -->
            <div class="border p-3" style="background-color: red;">
                <h2 class="text-center" style="color:white;font-weight: bold;">¡Hola de nuevo!</h2>
                <h3 class="text-center" style="color:white;font-weight: bold;">Inicia sesión para continuar.</h3>
            </div>
            <!-- CUADRO NEGRO -->
            <div class="border p-4 shadow" style="background-color: black; margin-top: 0;">
                <form>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label text-white">Usuario</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label text-white">Contraseña</label>
                        <input type="password" class="form-control" id="exampleInputPassword1">
                    </div>
                    <button type="submit" class="btn btn-primary">Iniciar sesión</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
