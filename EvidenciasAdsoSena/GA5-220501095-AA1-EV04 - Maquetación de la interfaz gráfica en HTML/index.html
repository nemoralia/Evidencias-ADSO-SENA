<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMORALIA</title>
    <!-- Bootstrap CSS -->
    <style>
        .text-white {
            color: white;
        }
    </style>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- FORMULARIO DE REGISTRO -->
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="w-50">
            <!-- Título del formulario de registro en un cuadro aparte con fondo rojo -->
            <div class="border p-3 mb-4" style="background-color: red;">
                <h2 class="text-center" style="color:white;font-weight: bold;">¡Hola de nuevo!</h2>
                <h3 class="text-center" style="color:white;font-weight: bold;">Inicia sesión para continuar.</h3>
            </div>

            <div class="border p-4 shadow" style="background-color: black;">
                <form>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Usuario</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                    </div>

                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="exampleInputPassword1">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Ingresar</button>

                    <!-- Enlaces de "¿Olvidaste tu contraseña?" -->
                    <div class="mt-3 text-center">
                        <a href="#" class="d-block">¿Olvidaste tu contraseña?</a>
                        <a href="#" class="d-block">¿No tienes cuenta? Regístrate aquí</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
